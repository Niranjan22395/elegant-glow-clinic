version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: elegant-glow-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: elegantglow2024
      MONGO_INITDB_DATABASE: elegant-glow
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - elegant-glow-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: elegant-glow-clinic:backend
    container_name: elegant-glow-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:elegantglow2024@mongodb:27017/elegant-glow?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 30d
      FRONTEND_URL: http://localhost:4000
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-sagar007cena@gmail.com}
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - elegant-glow-network

  # Frontend (Production build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: elegant-glow-clinic:frontend
    container_name: elegant-glow-frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend
    networks:
      - elegant-glow-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_uploads:
    driver: local

networks:
  elegant-glow-network:
    driver: bridge

